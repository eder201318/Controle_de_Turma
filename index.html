            noite: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`

        // Base de dados das turmas MISTA (Manhã, Tarde e Noite)
        const turmasBase = [
            // TURMAS DA MANHÃ
            { 
                id: 1, nome: '1º Ano A', 
                grade: { 
                    segunda: { saida: '11:30', aulas: [{nome: 'Português', qtd: 3, prof: 'Ana', horario: '07:30 às 09:45'}, {nome: 'Matemática', qtd: 2, prof: 'Carlos', horario: '10:00 às 11:30'}] }, 
                    terca:   { saida: '11:30', aulas: [{nome: 'Ciências', qtd: 2, prof: 'Sônia', horario: '07:30 às 09:00'}, {nome: 'História', qtd: 3, prof: 'Pedro', horario: '09:15 às 11:30'}] },

                    quinta:  { saida: '11:30', aulas: [{nome: 'Português', qtd: 3, prof: 'Ana', horario: '07:30 às 09:45'}, {nome: 'Inglês', qtd: 2, prof: 'Mary', horario: '10:00 às 11:30'}] }, 
                    sexta:   { saida: '11:00', aulas: [{nome: 'Ed. Física', qtd: 2, prof: 'Beto', horario: '07:30 às 09:00'}, {nome: 'Artes', qtd: 2, prof: 'Lia', horario: '09:15 às 11:00'}] },
                    domingo: { saida: '12:20', aulas: [{nome: 'Ed.Fisica', qtd: 2, prof: 'Adriana ', horario: '08:00 às 10:00'}] } 
                } 
            },
            { 
                id: 2, nome: '2º Ano B', 
                grade: { 
                    segunda: { saida: '12:00', aulas: [{nome: 'Matemática', qtd: 3, prof: 'Marta', horario: '07:30 às 09:45'}, {nome: 'História', qtd: 2, prof: 'João', horario: '10:00 às 12:00'}] }, 
                    terca:   { saida: '12:00', aulas: [{nome: 'Português', qtd: 5, prof: 'Clara', horario: '07:30 às 12:00'}] }, 
                    quarta:  { saida: '12:00', aulas: [{nome: 'Ciências', qtd: 3, prof: 'Sônia', horario: '07:30 às 09:45'}, {nome: 'Inglês', qtd: 2, prof: 'Mary', horario: '10:00 às 12:00'}] }, 
                    quinta:  { saida: '12:00', aulas: [{nome: 'Geografia', qtd: 3, prof: 'Lucas', horario: '07:30 às 09:45'}, {nome: 'Artes', qtd: 2, prof: 'Lia', horario: '10:00 às 12:00'}] }, 
                    sexta:   { saida: '11:30', aulas: [{nome: 'Ed. Física', qtd: 2, prof: 'Beto', horario: '07:30 às 09:00'}, {nome: 'Português', qtd: 2, prof: 'Clara', horario: '09:15 às 11:30'}] },
                    domingo: { saida: '11:30', aulas: [{nome: 'Reforço', qtd: 2, prof: 'Marcos', horario: '09:30 às 11:30'}] }

            },
            
            // TURMAS DA TARDE
            { 
                id: 3, nome: '6º Ano A', 
                grade: { 
                    segunda: { saida: '17:30', aulas: [{nome: 'Ciências', qtd: 3, prof: 'Flávio', horario: '13:00 às 15:15'}, {nome: 'História', qtd: 3, prof: 'José', horario: '15:30 às 17:30'}] }, 
                    terca:   { saida: '17:30', aulas: [{nome: 'Português', qtd: 3, prof: 'Renata', horario: '13:00 às 15:15'}, {nome: 'Inglês', qtd: 2, prof: 'Paul', horario: '15:30 às 17:30'}] }, 
                    quarta:  { saida: '17:30', aulas: [{nome: 'Matemática', qtd: 4, prof: 'Igor', horario: '13:00 às 16:00'}, {nome: 'Ed. Física', qtd: 2, prof: 'Beto', horario: '16:00 às 17:30'}] }, 
                    quinta:  { saida: '17:30', aulas: [{nome: 'Geografia', qtd: 3, prof: 'Tiago', horario: '13:00 às 15:15'}, {nome: 'Artes', qtd: 2, prof: 'Rosa', horario: '15:30 às 17:30'}] }, 
                    sexta:   { saida: '17:00', aulas: [{nome: 'Inglês', qtd: 2, prof: 'Paul', horario: '13:00 às 14:30'}, {nome: 'Português', qtd: 3, prof: 'Renata', horario: '14:45 às 17:00'}] },
                    domingo: { saida: '16:00', aulas: [{nome: 'Teste Tarde', qtd: 1, prof: 'Sistema', horario: '15:00 às 16:00'}] } 
                } 
            },
            { 
                id: 4, nome: '7º Ano C', 
                grade: { 
                    segunda: { saida: '18:00', aulas: [{nome: 'Geografia', qtd: 2, prof: 'Tiago', horario: '13:00 às 14:30'}, {nome: 'Matemática', qtd: 4, prof: 'Igor', horario: '14:45 às 18:00'}] }, 
                    terca:   { saida: '18:00', aulas: [{nome: 'Matemática', qtd: 4, prof: 'Igor', horario: '13:00 às 16:00'}, {nome: 'Artes', qtd: 2, prof: 'Rosa', horario: '16:15 às 18:00'}] }, 
                    quarta:  { saida: '18:00', aulas: [{nome: 'Português', qtd: 4, prof: 'Renata', horario: '13:00 às 16:00'}, {nome: 'Ciências', qtd: 2, prof: 'Flávio', horario: '16:15 às 18:00'}] }, 
                    quinta:  { saida: '18:00', aulas: [{nome: 'História', qtd: 3, prof: 'José', horario: '13:00 às 15:15'}, {nome: 'Ed. Física', qtd: 3, prof: 'Beto', horario: '15:30 às 18:00'}] }, 
                    sexta:   { saida: '17:30', aulas: [{nome: 'Inglês', qtd: 3, prof: 'Paul', horario: '13:00 às 15:15'}, {nome: 'Espanhol', qtd: 2, prof: 'Pablo', horario: '15:30 às 17:30'}] },
                    domingo: { saida: '17:30', aulas: [{nome: 'Teste Tarde', qtd: 1, prof: 'Sistema', horario: '16:30 às 17:30'}] } 
                } 
            },

            // TURMAS DA NOITE (EJA / Ensino Médio)
            { 
                id: 5, nome: 'EJA - 1º Termo', 
                grade: { 
                    segunda: { saida: '22:30', aulas: [{nome: 'Português', qtd: 2, prof: 'Sílvia', horario: '19:00 às 20:30'}, {nome: 'Matemática', qtd: 2, prof: 'Fábio', horario: '20:45 às 22:30'}] }, 
                    terca:   { saida: '22:30', aulas: [{nome: 'História', qtd: 2, prof: 'Mauro', horario: '19:00 às 20:30'}, {nome: 'Geografia', qtd: 2, prof: 'Aline', horario: '20:45 às 22:30'}] }, 
                    quarta:  { saida: '22:30', aulas: [{nome: 'Ciências', qtd: 2, prof: 'Lúcia', horario: '19:00 às 20:30'}, {nome: 'Inglês', qtd: 2, prof: 'John', horario: '20:45 às 22:30'}] }, 
                    quinta:  { saida: '22:30', aulas: [{nome: 'Matemática', qtd: 2, prof: 'Fábio', horario: '19:00 às 20:30'}, {nome: 'Português', qtd: 2, prof: 'Sílvia', horario: '20:45 às 22:30'}] }, 
                    sexta:   { saida: '22:00', aulas: [{nome: 'Artes', qtd: 1, prof: 'Rosa', horario: '19:00 às 19:45'}, {nome: 'Filosofia', qtd: 2, prof: 'Caio', horario: '20:00 às 22:00'}] },
                    domingo: { saida: '21:00', aulas: [{nome: 'Teste Noite', qtd: 1, prof: 'Sistema', horario: '20:00 às 21:00'}] } 
                } 
            },
            { 
                id: 6, nome: 'EJA 3º ETAPA ', 
                grade: { 
                    segunda: { saida: '22:45', aulas: [{nome: 'Física', qtd: 2, prof: 'Bruno', horario: '19:00 às 20:40'}, {nome: 'Química', qtd: 2, prof: 'Lúcia', horario: '21:00 às 22:45'}] }, 
                    terca:   { saida: '22:45', aulas: [{nome: 'Biologia', qtd: 2, prof: 'Amanda', horario: '19:00 às 20:40'}, {nome: 'Matemática', qtd: 2, prof: 'Fábio', horario: '21:00 às 22:45'}] }, 
                    quarta:  { saida: '22:45', aulas: [{nome: 'História', qtd: 2, prof: 'Mauro', horario: '19:00 às 20:40'}, {nome: 'Sociologia', qtd: 2, prof: 'Caio', horario: '21:00 às 22:45'}] }, 
                    quinta:  { saida: '22:45', aulas: [{nome: 'Português', qtd: 2, prof: 'Sílvia', horario: '19:00 às 20:40'}, {nome: 'Redação', qtd: 2, prof: 'Eliane', horario: '21:00 às 22:45'}] }, 
                    sexta:   { saida: '22:00', aulas: [{nome: 'Inglês', qtd: 2, prof: 'John', horario: '19:00 às 20:40'}, {nome: 'Ed. Física', qtd: 1, prof: 'Beto', horario: '21:00 às 22:00'}] },
                    domingo: { saida: '22:00', aulas: [{nome: 'Teste Noite', qtd: 1, prof: 'Sistema', horario: '21:00 às 22:00'}] } 
                } 
            }
        ];

        const chaveDoDia = { 0: 'domingo', 1: 'segunda', 2: 'terca', 3: 'quarta', 4: 'quinta', 5: 'sexta' };

        const diasDaSemana = [
            { valor: 1, nome: 'Seg' }, { valor: 2, nome: 'Ter' }, { valor: 3, nome: 'Qua' },
            { valor: 4, nome: 'Qui' }, { valor: 5, nome: 'Sex' }, { valor: 0, nome: 'Dom' }
        ];

        const statusInfo = {
            em_aula: {
                nome: 'Em Aula',
                bannerClass: 'bg-amber-100 text-amber-800 border-amber-300',
                iconeSVG: icones.clock
            },
            liberada: {
                nome: 'Liberada',
                bannerClass: 'bg-green-100 text-green-800 border-green-300',
                iconeSVG: icones.checkCircle
            }
        };

        const turnosConfig = {
            'Manhã': { titulo: 'Turno da Manhã', icone: icones.manha, cor: 'text-sky-600', bg: 'bg-sky-100', border: 'border-sky-200' },
            'Tarde': { titulo: 'Turno da Tarde', icone: icones.tarde, cor: 'text-amber-600', bg: 'bg-amber-100', border: 'border-amber-200' },
            'Noite': { titulo: 'Turno da Noite', icone: icones.noite, cor: 'text-indigo-600', bg: 'bg-indigo-100', border: 'border-indigo-200' }
        };

        let diaSelecionado = 1;
        let turnoSelecionado = 'Manhã'; // Atualizado automaticamente
        let ultimoMinutoRenderizado = -1;

        function obterDataBrasilia() {
            const dataLocal = new Date();
            const dataBrasiliaStr = dataLocal.toLocaleString("en-US", {timeZone: "America/Sao_Paulo"});
            return new Date(dataBrasiliaStr);
        }

        function obterTurno(horario) {
            if (horario === '00:00' || horario >= '19:00') return 'Noite';
            if (horario < '13:00') return 'Manhã';
            return 'Tarde';
        }

        function obterTurnoPeloRelogio() {
            const hora = obterDataBrasilia().getHours();
            if (hora < 13) return 'Manhã';
            if (hora >= 13 && hora < 19) return 'Tarde';
            return 'Noite';
        }

        function determinarEstado(diaAvaliado, saidaStr) {
            const agora = obterDataBrasilia();
            const diaAtual = agora.getDay(); 

            const diaAtualNumerico = diaAtual === 0 ? 7 : diaAtual;
            const diaAvaliadoNumerico = diaAvaliado === 0 ? 7 : diaAvaliado;

            if (diaAvaliadoNumerico < diaAtualNumerico) return 'liberada';
            if (diaAvaliadoNumerico > diaAtualNumerico) return 'em_aula';  

            const horaAtual = agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0');
            const saidaComparacao = saidaStr === '00:00' ? '24:00' : saidaStr;
            
            return horaAtual >= saidaComparacao ? 'liberada' : 'em_aula';
        }

        function tickRelogio() {
            const agora = obterDataBrasilia();
            const minutoAtual = agora.getMinutes();
            
            const relogioEl = document.getElementById('relogio-topo');
            if (relogioEl) {
                relogioEl.textContent = agora.toLocaleTimeString('pt-BR', { hour12: false });
            }

            if (minutoAtual !== ultimoMinutoRenderizado) {
                ultimoMinutoRenderizado = minutoAtual;
                renderizarApp();
            }
        }

        function inicializar() {
            const hoje = obterDataBrasilia().getDay();
            const diaExiste = diasDaSemana.some(d => d.valor === hoje);
            diaSelecionado = diaExiste ? hoje : 1;
            
            // Define o turno inicial com base na hora local de Brasília
            turnoSelecionado = obterTurnoPeloRelogio();
            
            tickRelogio();
            setInterval(tickRelogio, 1000);
        }

        window.mudarDia = function(novoDia) {
            diaSelecionado = novoDia;
            renderizarApp();
        };

        window.mudarTurno = function(novoTurno) {
            turnoSelecionado = novoTurno;
            renderizarApp();
        };

        function renderizarApp() {
            const appRoot = document.getElementById('app-root');
            const agora = obterDataBrasilia();
            const horaInicialStr = agora.toLocaleTimeString('pt-BR', { hour12: false });
            
            const diaAtualTexto = chaveDoDia[diaSelecionado];
            const turmasComAulaHoje = turmasBase.filter(t => t.grade[diaAtualTexto]);
            
            const turmasCalculadas = turmasComAulaHoje.map(turma => {
                const dadosDoDia = turma.grade[diaAtualTexto];
                const estadoCalculado = determinarEstado(diaSelecionado, dadosDoDia.saida);
                return { ...turma, estado: estadoCalculado, dadosDoDia };
            });

            // Filtra as turmas pelo turno selecionado e ordena pelo horário de saída
            const turmasDoTurno = turmasCalculadas.filter(t => obterTurno(t.dadosDoDia.saida) === turnoSelecionado);
            turmasDoTurno.sort((a, b) => a.dadosDoDia.saida.localeCompare(b.dadosDoDia.saida));

            const turmasLiberadasNoTurno = turmasDoTurno.filter(t => t.estado === 'liberada').length;
            const configTurno = turnosConfig[turnoSelecionado];

            // 1. HEADER 
            let html = `
                <header class="bg-blue-900 text-white pt-4 pb-2 px-4 sm:px-8 shadow-md sticky top-0 z-20">
                    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                        <h1 class="text-2xl font-bold flex items-center gap-2">
                            <span class="w-7 h-7 text-blue-300">${icones.users}</span>
                            Portaria Escolar
                        </h1>
                        <div class="flex flex-wrap items-center gap-2">
                            <div class="flex items-center gap-2 text-sm font-bold bg-blue-950/60 px-3 py-1.5 rounded-lg border border-blue-800 shadow-inner">
                                <span class="w-4 h-4 text-emerald-400 animate-pulse">${icones.live}</span>
                                <span id="relogio-topo" class="tracking-widest text-emerald-50">${horaInicialStr}</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-xs font-medium bg-blue-800/80 px-2 py-1.5 rounded-lg border border-blue-700">
                                <span class="w-4 h-4 text-green-400">${icones.checkSquare}</span>
                                <span>${turmasLiberadasNoTurno} / ${turmasDoTurno.length} saíram (${turnoSelecionado})</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Barra de Dias da Semana -->
                    <div class="max-w-7xl mx-auto flex w-full gap-1 sm:gap-2 overflow-x-auto pb-2">
            `;

            diasDaSemana.forEach(dia => {
                const ativo = diaSelecionado === dia.valor;
                const classeBotao = ativo ? 'bg-white text-blue-900 shadow-sm' : 'bg-blue-800 text-blue-100 hover:bg-blue-700';
                html += `<button onclick="mudarDia(${dia.valor})" class="flex-1 min-w-[50px] py-2 px-1 sm:px-4 rounded-lg text-sm sm:text-base font-bold transition-colors text-center ${classeBotao}">${dia.nome}</button>`;
            });

            html += `
                    </div>
                    
                    <!-- Barra de Filtro de Turnos -->
                    <div class="max-w-7xl mx-auto flex w-full gap-2 overflow-x-auto mt-2 border-t border-blue-800/50 pt-3 pb-1">
            `;

            const opcoesTurnos = [
                { id: 'Manhã', nome: 'Manhã', icone: icones.manha },
                { id: 'Tarde', nome: 'Tarde', icone: icones.tarde },
                { id: 'Noite', nome: 'Noite', icone: icones.noite }
            ];

            opcoesTurnos.forEach(opt => {
                const ativo = turnoSelecionado === opt.id;
                // Botão amarelo forte se selecionado, senão botão azul escuro
                const classeBotao = ativo 
                    ? 'bg-amber-400 text-blue-950 shadow-md ring-2 ring-amber-300 ring-offset-2 ring-offset-blue-900' 
                    : 'bg-blue-800/80 text-blue-200 hover:bg-blue-700 hover:text-white';
                
                html += `
                    <button onclick="mudarTurno('${opt.id}')" class="flex-1 min-w-[90px] flex items-center justify-center gap-1.5 py-1.5 px-2 rounded-lg text-xs sm:text-sm font-bold transition-all ${classeBotao}">
                        <span class="w-4 h-4 shrink-0">${opt.icone}</span>
                        <span>${opt.nome}</span>
                    </button>
                `;
            });

            html += `
                    </div>
                </header>
                <main class="p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto space-y-8">
            `;

            // 2. RENDERIZA OS CARTÕES EM UM ÚNICO GRID DINÂMICO
            if (turmasDoTurno.length > 0) {
                html += `
                    <div class="grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-4 sm:gap-6">
                `;

                turmasDoTurno.forEach(turma => {
                    const infoAtual = statusInfo[turma.estado];
                    const dadosDoDia = turma.dadosDoDia;
                    
                    const htmlDisciplinas = dadosDoDia.aulas.map(aula => 
                        `<div class="bg-blue-50 text-blue-800 px-2.5 py-1.5 rounded-md border border-blue-200 shadow-sm flex flex-col gap-0.5 w-fit">
                            <div class="text-xs whitespace-nowrap">
                                <span class="font-bold">${aula.qtd}x ${aula.nome}</span> 
                                <span class="font-medium text-blue-600 ml-1">(${aula.prof})</span>
                            </div>
                            <div class="flex items-center gap-1 text-[10px] text-blue-500 font-bold uppercase tracking-wider mt-0.5">
                                <span class="w-3 h-3">${icones.clock}</span>
                                <span>${aula.horario || 'Horário não definido'}</span>
                            </div>
                        </div>`
                    ).join('');
                    
                    html += `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 flex flex-col justify-between h-full ${turma.estado === 'liberada' ? 'bg-green-50/40 border-green-400' : ''}">
                            <div>
                                <!-- Topo do Card -->
                                <div class="flex justify-between items-start mb-5">
                                    <div class="flex flex-col gap-2.5 pr-2">
                                        <h3 class="text-2xl sm:text-3xl font-black text-slate-800 leading-none tracking-tight">${turma.nome}</h3>
                                        <div class="text-sm font-bold text-red-600 flex items-center gap-2 bg-red-50 w-fit px-3 py-1.5 rounded-lg border border-red-100 shadow-sm">
                                            <span class="w-4 h-4 shrink-0">${icones.clock}</span>
                                            <span>Aulas até às ${dadosDoDia.saida}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Secção de Disciplinas -->
                                <div class="mb-5 bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                                    <div class="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                                        <span class="w-4 h-4 shrink-0 text-slate-400">${icones.book}</span> 
                                        <span>Aulas de Hoje:</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2">
                                        ${htmlDisciplinas}
                                    </div>
                                </div>
                            </div>

                            <!-- Banner Gigante Automático no fundo -->
                            <div class="mt-auto flex items-center justify-center gap-2.5 py-3.5 px-4 border-2 rounded-xl transition-all shadow-sm ${infoAtual.bannerClass}">
                                <span class="w-6 h-6">${infoAtual.iconeSVG}</span>
                                <span class="text-[15px] sm:text-[17px] font-black uppercase tracking-widest">Status: ${infoAtual.nome}</span>
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                `;
            } else {
                // Feedback visual quando não há aulas no turno selecionado
                html += `
                    <div class="flex flex-col items-center justify-center py-16 px-4 bg-white rounded-2xl border-2 border-dashed ${configTurno.border} opacity-80 mt-8">
                        <div class="p-4 rounded-full ${configTurno.bg} ${configTurno.cor} mb-4">
                            <span class="w-12 h-12 block">${configTurno.icone}</span>
                        </div>
                        <h3 class="text-xl sm:text-2xl font-black text-slate-600 tracking-tight text-center">Nenhuma turma de ${turnoSelecionado} hoje</h3>
                        <p class="text-slate-500 font-medium mt-2 text-center">Pode relaxar! As saídas deste turno estão vazias.</p>
                    </div>
                `;
            }

            html += `</main>`;
            appRoot.innerHTML = html;
        }

        window.onload = inicializar;
    </script>
</body>
</html>
